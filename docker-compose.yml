# LocalStack provides a free, local, S3-compatible endpoint so the Terraform +
# boto3 code path works fully offline at zero cost.
services:
  localstack:
    image: localstack/localstack:3.5
    container_name: datapulse-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=0
      - PERSISTENCE=0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20
