name: DataPulse Pipeline

on:
  schedule:
    # Every 3 hours.
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: datapulse-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.5
        ports:
          - 4566:4566
        env:
          SERVICES: s3
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Provision infrastructure (Terraform -> LocalStack)
        run: |
          terraform -chdir=infra init -input=false
          terraform -chdir=infra apply -auto-approve -input=false -var "use_localstack=true"
          terraform -chdir=infra output

      - name: Run pipeline
        run: python -m datapulse.pipeline run

      - name: Commit results
        run: |
          git config user.name "datapulse-bot"
          git config user.email "datapulse-bot@users.noreply.github.com"
          git add -f data/datapulse.duckdb data/processed reports || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(pipeline): scheduled run $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
          fi
